name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'index.js'
      - 'package.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # 提前启用 Node.js 24 运行时，消除 Node.js 20 的废弃警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        # 保持 v4，目前它是最稳定的版本
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        # 建议使用 v3 (v3.3.0+ 已支持新运行时)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # 保持 v3 (v3.6.0+ 已优化对 Node.js 20+ 的支持)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        # 核心变动：将 v5 升级到 v6，v6 是专门为新环境优化的版本
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 注意到你在代码中会根据架构下载不同的二进制文件
          # 这里构建 amd64 和 arm64 是完全正确的做法
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ethanvpn:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=HTTP Server
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
